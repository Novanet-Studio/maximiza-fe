<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto (Netlify)</title>
</head>
<body>
    <form name="FORMULARIO_DE_CONTACTO" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input name="bot-field" />
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="text" name="message" />
        <select name="area_of_interest">
            <option value="Apertura de Cuenta Corretaje">Apertura de Cuenta Corretaje</option>
            <option value="Gestión Patrimonial">Gestión Patrimonial</option>
            <option value="Financiamiento Corporativo">Financiamiento Corporativo</option>
            <option value="Otro">Otro</option>
        </select>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
